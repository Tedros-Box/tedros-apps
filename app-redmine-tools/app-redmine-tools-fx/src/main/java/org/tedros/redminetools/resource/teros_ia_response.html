<html>
  <head>
    <style>
      body {
        border: 0; margin: 0; background: #f5f5f5;
      }
      #chat-container {
        width: 100%;
        height: 100vh;
        overflow-y: auto;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }
      .chat-message {
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        margin-bottom: 12px;
        padding: 12px 18px;
        max-width: 70%;
        align-self: flex-start;
        font-family: Arial, sans-serif;
        font-size: 15px;
        word-break: break-word;
      }
      .chat-message.ai {
        background: #e0f7fa;
        align-self: flex-end;
      }
    </style>
  </head>
  <body>
    <h4>Teros</h4>
    <div id="chat-container"></div>
    <script type="text/javascript">
      function appendAIResponse(text, isAI = true) {
        const container = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-message' + (isAI ? ' ai' : '');
        msgDiv.textContent = text;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
      }
      // Example usage:
      // appendAIResponse('Olá, como posso ajudar?');
      // appendAIResponse('Esta é uma resposta do modelo de IA.', true);
    </script>
  </body>
</html>
