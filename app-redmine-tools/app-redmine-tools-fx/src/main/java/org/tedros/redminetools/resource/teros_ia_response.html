<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
      body {
        border: 0; margin: 0;
        background: linear-gradient(135deg, #232526 0%, #414345 100%);
        min-height: 100vh;
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      #chat-container {
        width: 100%;
        height: 100vh;
        overflow-y: auto;
        padding: 32px 0 32px 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 18px;
        align-items: center; /* Centraliza os boxes */
        max-width: 800px;
        margin: 0 auto;
      }
      .chat-message {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        margin: 0 24px;
        padding: 18px 26px;
        max-width: 70%;
        word-break: break-word;
        transition: box-shadow 0.2s, transform 0.2s;
        animation: fadeIn 0.5s;
        border: 1px solid #e0e0e0;
      }
      .chat-message.ai {
        border: 1.5px solid #80deea;
        box-shadow: 0 6px 24px rgba(128,222,234,0.08);
      }
      .chat-message, .chat-message * {
        font-size: 9px !important;
      }
      h4 {
        color: #fff;
        font-weight: 600;
        letter-spacing: 1px;
        margin: 0 0 18px 32px;
        font-size: 1.4em;
        text-shadow: 0 2px 8px rgba(0,0,0,0.18);
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (max-width: 600px) {
        #chat-container {
          padding: 16px 0;
        }
        .chat-message {
          margin: 0 8px;
          padding: 12px 14px;
          font-size: 15px;
        }
        h4 {
          margin-left: 12px;
          font-size: 1.1em;
        }
      }
    </style>
  </head>
  <body>
    <h4>Teros</h4>
    <div id="chat-container"></div>

  <script type="text/javascript">
    mermaid.initialize({ startOnLoad: false });

    function getRandomBorderColor() {
      const colors = ['#80deea','#ffb74d','#81c784','#ba68c8','#ffd54f','#e57373','#64b5f6','#a1887f','#4db6ac','#f06292'];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function appendAIResponse(text, isAI = true) {
      const container = document.getElementById('chat-container');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'chat-message' + (isAI ? ' ai' : '');
      msgDiv.innerHTML = text;
      msgDiv.style.borderColor = getRandomBorderColor();
      container.appendChild(msgDiv);
      container.scrollTop = container.scrollHeight;

      // Renderizar Mermaid dentro desta mensagem
      const mermaidDivs = msgDiv.querySelectorAll('.mermaid');
      mermaidDivs.forEach((el) => {
        mermaid.init(undefined, el);
      });
    }	
  </script>
</body>
</html>
